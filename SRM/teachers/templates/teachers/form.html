{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-chalkboard-teacher me-2"></i>{{ title }}
                    </h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-secondary">
                                <i class="fas fa-save me-2"></i> {{ button_text }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% block extra_css %}
<style>
    /* Styling for standard form inputs */
    form p { margin-bottom: 1.2rem; }
    form label { font-weight: 600; color: #495057; margin-bottom: 0.3rem; }
    
    /* Specific styling for the Subjects Checkbox list */
    #id_subjects {
        list-style-type: none;
        padding: 10px 15px;
        margin: 0;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        max-height: 200px; /* Makes it scrollable if there are many subjects */
        overflow-y: auto;
        background-color: #fff;
    }
    #id_subjects li {
        margin-bottom: 8px;
    }
    #id_subjects input[type="checkbox"] {
        margin-right: 8px;
        transform: scale(1.2);
    }
    .helptext {
        font-size: 0.85em;
        color: #6c757d;
        display: block;
        margin-top: 4px;
    }
</style>
{% endblock %}
{% endblock %}
